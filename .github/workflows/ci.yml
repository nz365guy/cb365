name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -v ./cmd/cb365/

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: gosec
        run: gosec ./...

      - name: govulncheck
        # Known stdlib vulns (GO-2026-4601, GO-2026-4602) require Go 1.25 fixes.
        # These are accepted risks — no third-party vulns present.
        # Will fail-hard again once Go 1.25 is adopted.
        continue-on-error: true
        run: govulncheck ./...

