name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v ./cmd/cb365/

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: gosec
        run: gosec ./...

      - name: govulncheck
        # Stdlib vulns GO-2026-4601, GO-2026-4870, GO-2026-4946 in Go 1.25.8.
        # Fixed in Go 1.25.9 (not yet released). No cb365 code changes needed.
        # Remove continue-on-error once setup-go installs >= 1.25.9.
        continue-on-error: true
        run: govulncheck ./...

